server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5432/aiflow
    username: aiflow
    password: aiflow_secret
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: aiflow-jwt-secret-key-for-user-service-2024-change-in-production
  access-token-expiration-ms: 3600000
  refresh-token-expiration-ms: 604800000

logging:
  level:
    com.aiplatform.user: DEBUG